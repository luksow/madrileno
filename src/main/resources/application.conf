app {
  name = "madrileno"
  environment = "Dev"
  environment = ${?APP_ENVIRONMENT}
  version = "dev"
  version = ${?APP_VERSION}
  api-version = "v1"
}

http {
  host = "0.0.0.0"
  host = ${?INTERFACE}
  port = 9000
  port = ${?PORT}
  max-request-size = 10485760 // 10 MiB (large enough for image uploads)
  max-request-size = ${?MAX_REQUEST_SIZE}
  base-url = "http://localhost:9000"
  base-url = ${?BASE_URL}
}

cors {
  enabled = true
  enabled = ${?CORS_ENABLED}
  allowed-origins = "" // comma-separated origins; "*" = any; empty = any origin in dev, otherwise the base-url host
  allowed-origins = ${?CORS_ALLOWED_ORIGINS}
  max-age = 1h // how long browsers may cache the preflight result
  max-age = ${?CORS_MAX_AGE}
}

pg {
  host = "localhost"
  host = ${?PG_HOST}
  port = 5432
  port = ${?PG_PORT}
  database = "madrileno"
  database = ${?PG_DATABASE}
  user = "postgres"
  user = ${?PG_USER}
  password = ${?PG_PASSWORD}
}

scheduler {
  concurrency = 10
  concurrency = ${?SCHEDULER_CONCURRENCY}
  polling-interval = 10s
  polling-interval = ${?SCHEDULER_POLLING_INTERVAL}
  heartbeat-interval = 5m
  heartbeat-interval = ${?SCHEDULER_HEARTBEAT_INTERVAL}
  missed-heartbeat-limit = 6
  missed-heartbeat-limit = ${?SCHEDULER_MISSED_HEARTBEAT_LIMIT}
  retry-base-delay = 30s
  retry-base-delay = ${?SCHEDULER_RETRY_BASE_DELAY}
  retry-backoff-rate = 1.5
  retry-backoff-rate = ${?SCHEDULER_RETRY_BACKOFF_RATE}
  retry-max-delay = 1h
  retry-max-delay = ${?SCHEDULER_RETRY_MAX_DELAY}
}

mailer {
  host = "localhost"
  host = ${?MAILER_HOST}
  port = 587
  port = ${?MAILER_PORT}
  username = ${?MAILER_USERNAME}
  password = ${?MAILER_PASSWORD}
  from-address = "noreply@example.com"
  from-address = ${?MAILER_FROM_ADDRESS}
  from-name = "Madrileno"
  from-name = ${?MAILER_FROM_NAME}
  tls = true
  tls = ${?MAILER_TLS}
}

logging {
  loglevel-request-response = 4
  loglevel-request-response = ${?LOGLEVEL_REQUEST_RESPONSE}
  // 1 error, 2 warning, 3 info, 4 debug
}

firebase {
  project-id = ${?FIREBASE_PROJECT_ID}
}

dev-auth {
  enabled = false
  enabled = ${?DEV_AUTH_ENABLED}
}

oidc {
  providers {}
  primary {
    name = "oidc"
    name = ${?OIDC_PROVIDER_NAME}
    issuer = ${?OIDC_ISSUER}
    audience = ${?OIDC_AUDIENCE}
    jwks-uri = ${?OIDC_JWKS_URI}
  }
}

jwt {
  secret = "YouNeedToOverrideIt"
  secret = ${?JWT_SECRET}
  valid-for = "PT5M"
  valid-for = ${?JWT_VALID_FOR}
}

admin {
  user = "admin"
  user = ${?ADMIN_USER}
  password = "admin"
  password = ${?ADMIN_PASSWORD}
}

storage {
  max-fetch-bytes = 10485760 // 10 MiB; cap on ObjectStore.fetchBytes to bound JVM heap
  max-fetch-bytes = ${?STORAGE_MAX_FETCH_BYTES}
  object-storage {
    endpoint = "http://localhost:59000"
    endpoint = ${?S3_ENDPOINT}
    region = "us-east-1"
    region = ${?S3_REGION}
    bucket = "madrileno"
    bucket = ${?S3_BUCKET}
    access-key-id = "minioadmin"
    access-key-id = ${?S3_ACCESS_KEY_ID}
    secret-access-key = "minioadmin"
    secret-access-key = ${?S3_SECRET_ACCESS_KEY}
  }
}