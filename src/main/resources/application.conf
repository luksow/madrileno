app {
  name = "madrileno"
  environment = "dev"
  environment = ${?APP_ENVIRONMENT}
  version = "dev"
  version = ${?APP_VERSION}
  api-version = "v1"
}

http {
  host = "0.0.0.0"
  host = ${?INTERFACE}
  port = 9000
  port = ${?PORT}
  max-request-size = 20480 // bytes
  max-request-size = ${?MAX_REQUEST_SIZE}
}

pg {
  host = "localhost"
  host = ${?PG_HOST}
  port = 5432
  port = ${?PG_PORT}
  database = "madrileno"
  database = ${?PG_DATABASE}
  user = "postgres"
  user = ${?PG_USER}
  password = ${?PG_PASSWORD}
}

scheduler {
  concurrency = 10
  concurrency = ${?SCHEDULER_CONCURRENCY}
  polling-interval = 10s
  polling-interval = ${?SCHEDULER_POLLING_INTERVAL}
  heartbeat-interval = 5m
  heartbeat-interval = ${?SCHEDULER_HEARTBEAT_INTERVAL}
  missed-heartbeat-limit = 6
  missed-heartbeat-limit = ${?SCHEDULER_MISSED_HEARTBEAT_LIMIT}
  retry-base-delay = 30s
  retry-base-delay = ${?SCHEDULER_RETRY_BASE_DELAY}
  retry-backoff-rate = 1.5
  retry-backoff-rate = ${?SCHEDULER_RETRY_BACKOFF_RATE}
  retry-max-delay = 1h
  retry-max-delay = ${?SCHEDULER_RETRY_MAX_DELAY}
}

logging {
  loglevel-request-response = 4
  loglevel-request-response = ${?LOGLEVEL_REQUEST_RESPONSE}
  // 1 error, 2 warning, 3 info, 4 debug
}

firebase {
  key = "{}"
  key = ${?FIREBASE_KEY}
}

jwt {
  secret = "YouNeedToOverrideIt"
  secret = ${?JWT_SECRET}
  valid-for = "PT5M"
  valid-for = ${?JWT_VALID_FOR}
}

refresh-token {
  secret = "YouNeedToOverrideItAsWell"
  secret = ${?REFRESH_TOKEN_SECRET}
  valid-for = "PT100Y"
  valid-for = ${?REFRESH_TOKEN_VALID_FOR}
}