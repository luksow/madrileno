services:
  postgres:
    image: postgres:17-alpine
    container_name: madrileno-postgres
    environment:
      POSTGRES_DB: madrileno
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - madrileno-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d madrileno"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: madrileno-mailpit
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "51025:1025"  # SMTP
      - "58025:8025"  # UI + REST API at http://localhost:58025

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.15.0
    container_name: madrileno-openobserve
    environment:
      ZO_ROOT_USER_EMAIL: root@example.com
      ZO_ROOT_USER_PASSWORD: Complexpass#123
    ports:
      - "55080:5080"  # UI at http://localhost:55080  (login: root@example.com / Complexpass#123)
    volumes:
      - madrileno-openobserve:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5080/healthz | grep -q ok || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  madrileno-postgres:
  madrileno-openobserve:
