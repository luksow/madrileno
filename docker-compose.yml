services:
  postgres:
    image: postgres:latest
    container_name: madrileno-postgres
    environment:
      POSTGRES_DB: madrileno
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - madrileno-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d madrileno"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: madrileno-mailpit
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "127.0.0.1:51025:1025"  # SMTP
      - "127.0.0.1:58025:8025"  # UI + REST API at http://localhost:58025

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: madrileno-openobserve
    environment:
      ZO_ROOT_USER_EMAIL: root@example.com
      ZO_ROOT_USER_PASSWORD: Complexpass#123
    ports:
      - "127.0.0.1:55080:5080"  # UI at http://localhost:55080  (login: root@example.com / Complexpass#123)
    volumes:
      - madrileno-openobserve:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5080/healthz | grep -q ok || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: madrileno-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:59000:9000"  # S3 API
      - "127.0.0.1:59001:9001"  # Console UI at http://localhost:59001  (login: minioadmin / minioadmin)
    volumes:
      - madrileno-minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/madrileno"

  unleash-postgres:
    image: postgres:latest
    container_name: madrileno-unleash-postgres
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: unleash
    volumes:
      - madrileno-unleash-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash -d unleash"]
      interval: 5s
      timeout: 3s
      retries: 10

  unleash:
    image: unleashorg/unleash-server:latest
    container_name: madrileno-unleash
    depends_on:
      unleash-postgres:
        condition: service_healthy
    environment:
      DATABASE_HOST: unleash-postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: unleash
      DATABASE_USERNAME: unleash
      DATABASE_PASSWORD: unleash
      DATABASE_SSL: "false"
      LOG_LEVEL: warn
      INIT_ADMIN_API_TOKENS: "*:*.unleash-insecure-admin-token"
      INIT_CLIENT_API_TOKENS: "default:development.unleash-insecure-api-token"
    ports:
      - "127.0.0.1:54242:4242"  # UI + API at http://localhost:54242  (default admin: admin / unleash4all)

volumes:
  madrileno-postgres:
  madrileno-openobserve:
  madrileno-minio:
  madrileno-unleash-postgres:
