rules = [
  DisableSyntax,
  ExplicitResultTypes,
  LeakingImplicitClassVal,
  NoAutoTupling,
  NoValInForComprehension,
  OrganizeImports,
  ProcedureSyntax,
  RedundantSyntax,
  RemoveUnused
]

DisableSyntax {
  noVars = true
  noNulls = true
  noReturns = true
  noWhileLoops = true
  noAsInstanceOf = true
  noIsInstanceOf = true
  noXml = true
  noFinalVal = true
  noFinalize = true
  noValPatterns = true
  regex = [
    {
      id = "noRandomUuid"
      pattern = "UUID\\.randomUUID"
      message = "Use IdGenerator.generateId / UuidV7.generate for time-ordered UUIDv7 ids (in tests, TestData.randomUuid / random*Id). Don't generate random v4 UUIDs directly."
    }
  ]
}

OrganizeImports {
  targetDialect = Scala3
  blankLines = Auto
  coalesceToWildcardImportThreshold = null
  expandRelative = false
  groupedImports = Merge
  groups = [
    "*"
    "re:(javax?|scala)\\."
  ]
  importSelectorsOrder = Ascii
  importsOrder = Ascii
  preset = DEFAULT
  removeUnused = true
}